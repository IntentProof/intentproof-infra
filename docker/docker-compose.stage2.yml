services:
  postgres:
    image: postgres:15
    container_name: intentproof-postgres
    environment:
      POSTGRES_USER: intentproof
      POSTGRES_PASSWORD: intentproof
      POSTGRES_DB: intentproof
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intentproof -d intentproof"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10
    container_name: intentproof-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
